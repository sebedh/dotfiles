
# Bindings
unbind C-b
unbind o

bind C-a send-prefix
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
bind -r ^ last-window

# Pane movement
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# Pane resize
bind -r C-h resize-pane -L
bind -r C-j resize-pane -D
bind -r C-k resize-pane -U
bind -r C-l resize-pane -R

bind -r C-n next-window

bind o attach -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf
bind f run-shell "tmux neww ~/.local/bin/tmux-sessionizer.sh"
bind C-j display-popup -e "~/.local/bin/tmux-session-fzf.sh"

set -s escape-time 0
set -g history-limit 10000
set -g base-index 1
set -g renumber-windows on
set -g focus-events on
set -g mouse on
set -s escape-time 0
set -g prefix C-a
set -g status-style 'bg=#333333 fg=#5eacd3'

set -w -g pane-base-index 1
set -w -g mode-keys vi


# Ensure that everything on the right side of the status line
# is included.
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_user}"
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Plugin manager tpm
set -g @plugin 'tmux-plugins/tpm'
# more plugins will go here
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'

# Configure the Catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
run '~/.config/tmux/plugins/tpm/tpm'
# Load Catppuccin (no TPM due to naming conflicts)
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
