$mod = SUPER
$term = ghostty

monitor=,preferred,auto,1

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

xwayland {
    force_zero_scaling = true
}

input {
    kb_layout = us,se
    kb_options = grp:win_space_toggle,caps:escape
    repeat_delay = 300
    repeat_rate = 50
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 2
        passes = 2
        special = true
        brightness = 0.60
        contrast = 0.75
    }
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 3.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0
    animation = specialWorkspace, 1, 3, easeOutQuint, slidevert
}

dwindle {
    preserve_split = true
    force_split = 2
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    focus_on_activate = true
}

cursor {
    hide_on_key_press = true
    warp_on_change_workspace = 1
}

exec-once = kanshi
exec-once = waybar -c ~/.config/waybar/config-hyprland.jsonc -s ~/.config/waybar/style.css
exec-once = mako
exec-once = hypridle

bind = $mod, Return, exec, env GTK_IM_MODULE=simple $term
bind = $mod SHIFT, Return, exec, env GTK_IM_MODULE=simple $term -e toolbox enter
bind = $mod, R, exec, rofi -show drun -location 2 -width 100 -lines 2 -line-margin 0 -line-padding 1 -hide-scrollbar -kb-element-next "Tab" -kb-row-tab ""
bind = $mod, Z, exec, hyprlock

bind = $mod, X, killactive
bind = $mod SHIFT, X, killactive

bind = $mod, T, togglesplit
bind = $mod, F, fullscreen

bind = $mod, h, movefocus, l
bind = $mod SHIFT, h, movewindow, l
bind = $mod, j, movefocus, d
bind = $mod SHIFT, j, movewindow, d
bind = $mod, k, movefocus, u
bind = $mod SHIFT, k, movewindow, u
bind = $mod, l, movefocus, r
bind = $mod SHIFT, l, movewindow, r

bind = $mod SHIFT, greater, movecurrentworkspacetomonitor, +1
bind = $mod SHIFT, less, movecurrentworkspacetomonitor, -1

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, F2, exec, hyprctl reload

windowrulev2 = workspace 1, class:^(Zen Browser)$
windowrulev2 = workspace 1, class:^(Chromium)$
windowrulev2 = workspace 7, class:^(Microsoft Teams)$
windowrulev2 = workspace 7, class:^(Signal)$
windowrulev2 = workspace 7, class:^(Slack)$
windowrulev2 = workspace 8, class:^(Outlook)$
windowrulev2 = workspace 5, class:^(org.remmina.Remmina)$
